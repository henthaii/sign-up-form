<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="sign-up-form.css">
<title>Sign-up Form</title>
</head>

<body>

<!-- when adding photo, be sure to credit Ryan Kwok -->
<!-- five sections are needed
section for odin bar imposed over the others w transparent bg
left half ish for photo
right half ish for the 3 remaining sections
top section will be text super simple that leans towards bottom
middle section will be form 
bottom section will have the create account and the extra text  -->



<div class="container">
    <div class="image-container">
        <div class="logo">
            <img src="odin-lined.png" alt="logo">
            <div>Odin</div>
        </div>
        <img src="ryan-kwok.jpg" alt="Scenery">
        <p class="caption">Photo by <a href="https://unsplash.com/photos/green-mountain-with-clouds-xfYMLWgI8ww">Ryan Kwok</a> on Unsplash</p>
    </div>

    <div class="text-container">
        <div>
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</p>
            <p>You <i>know</i> you want to.</p>
        </div>
        <div>
            <p>Let's do this!<p>
            <form action="placeholder" method="post">
                <div class = "row_one">
                    <div>
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" name="first_name" id="first_name">
                    </div>
                    <div>
                        <label for="last_name">LAST NAME</label>
                        <input type="text" name="last_name" id="last_name">
                    </div>
                </div>
                <div class = "row_two">
                    <div>
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div>
                        <label for="phone_number">PHONE NUMBER</label>
                        <input type="tel" name="tel" id="tel">
                    </div>
                </div>
                <div class = "row_three">
                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div>
                        <label for="confirm_password">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm_password" id="confirm_password">
                    </div>
                </div>
            </form>
        </div>
        <div>
            <div>
                <button>Create Account</button>
                <p>Already have an account? Log in</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
